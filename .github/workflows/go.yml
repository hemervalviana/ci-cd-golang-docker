name: Go

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

jobs:
  test:
    runs-on: ${{ matrix.os }}
    env:
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: root
      DB_PORT: 5432

    strategy:
      matrix:
        go_version: ['1.21']
        os: ['ubuntu-latest']

    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v3
        with:
          go-version: ${{ matrix.go_version }}

      - name: Start DB
        run: |
          docker compose up -d
          echo "Aguardando Postgres aceitar conexões..."
          until docker compose exec -T db pg_isready -U root; do
            echo "Postgres ainda não está pronto, aguardando..."
            sleep 2
          done
          echo "Postgres pronto!"

      - name: Test
        run: go test -v main_test.go

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build
        run: go build -v main.go
