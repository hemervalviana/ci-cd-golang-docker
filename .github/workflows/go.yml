name: Go

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ '*' ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    env:
      DB_HOST: localhost
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: root
      DB_PORT: 5432
    
    strategy:
      matrix:
        go_version: ['1.21'] # Simplifiquei para focar no erro, mas pode manter as outras
        os: ['ubuntu-latest']

    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v3
      with:
        go-version: ${{ matrix.go_version }}
      
    - name: Build-DB
      # Comando atualizado para Docker Compose V2
      run: docker compose build
      
    - name: Create-DB
      # Subindo o banco e aguardando ele ficar pronto
      run: |
        docker compose up -d
        echo "Aguardando 10 segundos para o Postgres inicializar..."
        sleep 10

    - name: Test
      run: go test -v main_test.go 
      
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Build
      run: go build -v main.go
